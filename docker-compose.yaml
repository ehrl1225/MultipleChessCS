services:
  postgres:
    image: postgres:18
    container_name: "postgres"
    env_file:
      - ./src/MultipleChessCs/.env
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: ${PG_PASSWORD:-your_password}
      POSTGRES_DB: "chess"
    volumes:
      - ./postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    restart: unless-stopped